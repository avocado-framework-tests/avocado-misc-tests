# Configuration file for ppc64_cpu test suite
# All parameters are optional and have sensible defaults
# Uncomment and modify only the parameters you need to change

# Basic test loop count (default: 10)
test_loop: 10

# Functional tests - basic SMT and core operations
functional:
  iteration: 5  # Number of iterations (default: 5)

# Stress tests - intensive testing with random operations
stress:
  iterations: 20  # Number of stress iterations (default: 20)

# Build type configuration
run_type: !mux
    upstream:
        ppcutils_url: 'https://github.com/ibm-power-utilities/powerpc-utils/archive/refs/heads/master.zip'
        type: 'upstream'
    distro:
        type: 'distro'

