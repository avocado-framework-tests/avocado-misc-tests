# Avocado Test Parameters for embedding Container Tests 
# Models supported 3.4
# granite-embedding-125m-english
#
# embedding Version Configuration
RHAIIS_VERSION: ""

# Environment Variables
AIU_PCIE_IDS: "0233:70:00.0"
HOST_MODELS_DIR: "/opt/ibm/spyre/models/src"
VLLM_MODEL_PATH: "/models/multilingual-e5-large-instruct"
AIU_WORLD_SIZE: "1"
PROMPT_LENS: "512"  #supported 64,128,256,512
BATCH_SIZES: "4"   # supported 1,2,16,32,64,128,256

# Container Configuration
CONTAINER_URL: ""
CONTAINER_TAG: ""
API_KEY: ""
DEVICE: "/dev/vfio"
USERNS: "keep-id"
GROUP_ADD: "keep-groups"
SECURITY_OPT: "label=disable"
PIDS_LIMIT: "0"
MEMORY: "50G"
SHM_SIZE: "64M"
PORT_MAPPING: "127.0.0.1:8000:8000"

# User Configuration, keep empty if you want to run as root
USER: ""
SPYRE_GROUP: ""
HF_MODEL_NAME: "intfloat/multilingual-e5-large-instruct"

# embedding 3.4 Specific Parameters
VLLM_SPYRE_USE_CHUNKED_PREFILL: "0"

