# IBM Senlib Tests Configuration for Spyre AIU

# Required: Path to the IBM senlib RPM file to be installed in the container
SENLIB_RPM_PATH: ""

# Required: RHAIIS version (3.4 or 3.5)
RHAIIS_VERSION: ""

# Environment Variables
AIU_PCIE_IDS: ""
HOST_MODELS_DIR: "/opt/ibm/spyre/models/src"
VLLM_MODEL_PATH: "/models/granite-3.3-8b-instruct"
AIU_WORLD_SIZE: "1"
MAX_MODEL_LEN: "3072"
MAX_BATCH_SIZE: "16"

# Container Configuration
CONTAINER_URL: ""
CONTAINER_TAG: ""
API_KEY: ""
DEVICE: "/dev/vfio"
USERNS: "keep-id"
GROUP_ADD: "keep-groups"
SECURITY_OPT: "label=disable"
PIDS_LIMIT: "0"
MEMORY: "100G"
PORT_MAPPING: "127.0.0.1:8000:8000"

# User Configuration
SPYRE_GROUP: ""
