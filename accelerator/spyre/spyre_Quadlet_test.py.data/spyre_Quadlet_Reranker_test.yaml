# Spyre Quadlet Test Configuration for Reranker

USE_CASE: "reranker"

# Required: RHAIIS version (3.4 or 3.5)
RHAIIS_VERSION: ""

# Environment Variables
AIU_PCIE_IDS: ""
HOST_MODELS_DIR: "/opt/ibm/spyre/models/src"
VLLM_MODEL_PATH: "/models/bge-reranker-v2-m3"
AIU_WORLD_SIZE: "1"
MAX_MODEL_LEN: "1024"
MAX_BATCH_SIZE: "4"

# Container Configuration
CONTAINER_URL: ""
CONTAINER_TAG: ""
API_KEY: ""
DEVICE: "/dev/vfio"
USERNS: "keep-id"
GROUP_ADD: "keep-groups"
PIDS_LIMIT: "0"
MEMORY: "50G"
PORT_MAPPING: "127.0.0.1:8000:8000"

# User Configuration
SPYRE_GROUP: ""
USER: ""
