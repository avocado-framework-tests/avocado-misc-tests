scratch_mnt: '/mnt/scratch'
test_mnt: '/mnt/test'
disk_mnt: '/mnt/loop-device'

loop_type: !mux
    type: 'loop'
    loop_size: '9GiB'
    # Option to provide disk for loop device creation,
    # Uses '/' by default for file creation
    disk: "null"

fs_type: !mux
    fs_ext4_1k_nodioread_nolock:
        fs: 'ext4'
        args: '-R xunit -L 10 -g quick'
        mkfs_opt: '-b 1024 -O quota'
        mount_opt: '-o block_validity,nodioread_nolock'
