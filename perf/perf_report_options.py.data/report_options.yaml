--ignore-vmlinux: ""
--input: "perf.data"
--kallsyms: "/proc/kallsyms"
--max-stack: "5"
--objdump: "/usr/bin/objdump"
--parallelism: "2"
--parent: "main"
--percent-type: "total"
--percent-type: "local"
--percent-type: "local-period"
--percentage: "absolute"
--pid: "1"
--prefix: "/home/user/src"
