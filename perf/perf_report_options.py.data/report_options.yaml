--source: "/usr/src/linux"
--switch-off: "cycles"
--switch-on: "cycles"
--symbol-filter: "malloc"
--symbols: ""
--symbols: "2"
--tid: "1"
--time: "12:00,12:05"
--time: "1.0,5.0"
--time-quantum: "100"
-C: "0-3"
-I: "100"
-M: "intel"
-S: ""
-S: "2"
-T: "1234"
-U: "0-3"
-W: "80,80,80"
-W: ""
-c: "/tmp/callchain-cmp"
-d: ""
-d: "3"
-j: "any"
-m: "4"
-p: "1"
-w: "120"

