component: !mux
    sched:
        comp: 'sched'
    mm:
        comp: 'mm'
    mm_powerpc:
        comp: 'powerpc/mm'
    cpu_hotplug:
        comp: 'cpu-hotplug'
    memory_hotplug:
        comp: 'memory-hotplug'
    vDSO:
        comp: 'vDSO'
    mremap_test:
        comp: 'mm'
        subtest: 'mremap_test'
run_type: !mux
    upstream:
        type: 'upstream'
        location: "https://github.com/torvalds/linux/archive/master.zip"
